services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    depends_on:
      - backend
    environment:
      - API_BASE_URL=http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./backend/data:/app/backend/data
